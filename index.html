<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botanic Care — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#313522;
    --green-sage:#7d8768;
    --cream:#f5f1e8;
    --cream-warm:#ede5d3;
    --paper:#fbf9f4;
    --ink:#2a2c20;
    --muted:#6b6e5c;
    --green-pale:#e8ebe1;
    --display:'Cormorant Garamond', serif;
    --body:'Manrope', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:var(--body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  .bg-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .bg-circle{
    position:absolute;
    border-radius:50%;
    opacity:0.35;
  }
  .bg-circle-1{
    width:600px;height:600px;
    background:radial-gradient(circle, var(--green-pale) 0%, transparent 70%);
    top:-180px;right:-120px;
    animation:float-1 20s ease-in-out infinite;
  }
  .bg-circle-2{
    width:500px;height:500px;
    background:radial-gradient(circle, var(--cream-warm) 0%, transparent 70%);
    bottom:-200px;left:-100px;
    animation:float-2 24s ease-in-out infinite;
  }
  .bg-circle-3{
    width:350px;height:350px;
    background:radial-gradient(circle, rgba(185,160,53,0.15) 0%, transparent 70%);
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    animation:float-3 18s ease-in-out infinite;
  }
  @keyframes float-1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}
  @keyframes float-2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-40px)}}
  @keyframes float-3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}

  .coming-soon{
    position:relative;
    z-index:1;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px;
    text-align:center;
    gap:48px;
  }

  .logo{
    text-align:center;
    line-height:1;
    font-family:var(--display);
    opacity:0;
    animation:fade-up 1s ease forwards 0.2s;
  }
  .logo .mark{
    width:44px;height:44px;
    color:var(--green-deep);
    margin:0 auto 10px;
    display:block;
  }
  .logo .name{
    font-size:clamp(28px, 4vw, 42px);
    letter-spacing:0.18em;
    color:var(--green-deep);
    font-weight:500;
  }
  .logo .care{
    font-style:italic;
    font-size:clamp(20px, 2.8vw, 30px);
    color:var(--green-sage);
    display:inline;
    margin-left:0.35em;
    vertical-align:baseline;
  }

  .coming-text{
    font-family:var(--body);
    font-size:clamp(12px, 1.4vw, 15px);
    font-weight:500;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--muted);
    opacity:0;
    animation:fade-up 1s ease forwards 0.6s;
  }

  .cs-footer{
    position:relative;
    z-index:1;
    text-align:center;
    padding:24px 40px;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.08em;
    opacity:0.6;
  }

  @keyframes fade-up{
    from{opacity:0;transform:translateY(24px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>
</div>

<main class="coming-soon">
  <div class="logo">
    <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="currentColor">
        <ellipse cx="50" cy="22" rx="6" ry="14"/>
        <ellipse cx="34" cy="34" rx="5.5" ry="13" transform="rotate(-45 34 34)"/>
        <ellipse cx="66" cy="34" rx="5.5" ry="13" transform="rotate(45 66 34)"/>
        <ellipse cx="34" cy="62" rx="5.5" ry="13" transform="rotate(45 34 62)"/>
        <ellipse cx="66" cy="62" rx="5.5" ry="13" transform="rotate(-45 66 62)"/>
        <ellipse cx="50" cy="76" rx="6" ry="16"/>
        <circle cx="20" cy="48" r="3"/>
        <circle cx="80" cy="48" r="3"/>
      </g>
    </svg>
    <span class="name">BOTANIC</span>
    <span class="care">care</span>
  </div>
  <p class="coming-text">Coming Soon</p>
</main>

<footer class="cs-footer">
  &copy; 2026 Botanic Care — Todos los derechos reservados
</footer>

</body>
</html>
